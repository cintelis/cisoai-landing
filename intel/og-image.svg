<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b0f"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="0%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080b0f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00c8ff" stroke-width="0.5" stroke-opacity="0.10"/>
    </pattern>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Safe zone guide: content must stay within x=100–1100, y=60–570 -->
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="5" height="630" fill="#00c8ff"/>
  <rect x="5" y="0" width="1195" height="1" fill="#1e2d3d"/>
  <rect x="5" y="629" width="1195" height="1" fill="#1e2d3d"/>

  <!-- Corner brackets — inset 100px from edges for safe zone -->
  <path d="M 120 90 L 120 65 L 145 65" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 1080 90 L 1080 65 L 1055 65" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 120 540 L 120 565 L 145 565" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 1080 540 L 1080 565 L 1055 565" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.7"/>

  <!-- Hex logo mark -->
  <polygon points="130,275 157,260 184,275 184,305 157,320 130,305" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
  <polygon points="138,279 157,268 176,279 176,301 157,312 138,301" fill="#00c8ff" fill-opacity="0.08"/>
  <text x="157" y="296" font-family="Courier New,monospace" font-size="13" font-weight="700" fill="#00c8ff" text-anchor="middle">CA</text>

  <!-- Section label -->
  <text x="202" y="272" font-family="Courier New,monospace" font-size="11" letter-spacing="5" fill="#00c8ff" opacity="0.7">CISO AI</text>
  <rect x="202" y="282" width="500" height="1" fill="#1e2d3d"/>
  <text x="202" y="300" font-family="Courier New,monospace" font-size="10" letter-spacing="4" fill="#4a6070">// SECURITY UPDATES</text>

  <!-- Main headline — safe zone x=200, well within 100px margins -->
  <text x="198" y="378" font-family="Arial Black,Impact,sans-serif" font-size="78" font-weight="900" fill="#e8f0f8" letter-spacing="-2">THREAT &amp;</text>
  <text x="198" y="458" font-family="Arial Black,Impact,sans-serif" font-size="78" font-weight="900" fill="#00c8ff" letter-spacing="-2" filter="url(#text-glow)">COMPLIANCE</text>
  <text x="198" y="530" font-family="Arial Black,Impact,sans-serif" font-size="78" font-weight="900" fill="#00c8ff" letter-spacing="-2">NEWS</text>

  <!-- Subheadline — y=555 keeps it well above the 570 safe zone bottom -->
  <text x="198" y="558" font-family="Arial,sans-serif" font-size="15" font-weight="300" fill="#8a9ab0" letter-spacing="0.5">Plain-language summaries from trusted sources for Australian SMB decision-makers.</text>

  <!-- Vertical divider -->
  <rect x="840" y="80" width="1" height="460" fill="#1e2d3d"/>

  <!-- Right panel — all text starts at x=858, ends before x=1080 (safe zone) -->
  <circle cx="840" cy="130" r="3" fill="#00c8ff"/>
  <rect x="840" y="130" width="240" height="1" fill="#1e2d3d"/>
  <text x="858" y="123" font-family="Courier New,monospace" font-size="9" fill="#4a6070" letter-spacing="3">INTEL SOURCES</text>
  <text x="858" y="153" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#00c8ff">MULTI-SOURCE</text>

  <circle cx="840" cy="215" r="3" fill="#00ff88"/>
  <rect x="840" y="215" width="240" height="1" fill="#1e2d3d"/>
  <text x="858" y="208" font-family="Courier New,monospace" font-size="9" fill="#4a6070" letter-spacing="3">UPDATES</text>
  <text x="858" y="238" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#00ff88">CONTINUOUS</text>

  <circle cx="840" cy="300" r="3" fill="#00c8ff"/>
  <rect x="840" y="300" width="240" height="1" fill="#1e2d3d"/>
  <text x="858" y="293" font-family="Courier New,monospace" font-size="9" fill="#4a6070" letter-spacing="3">POWERED BY</text>
  <text x="858" y="323" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#00c8ff">CLAUDE AI</text>

  <circle cx="840" cy="385" r="3" fill="#00c8ff"/>
  <rect x="840" y="385" width="240" height="1" fill="#1e2d3d"/>
  <text x="858" y="378" font-family="Courier New,monospace" font-size="9" fill="#4a6070" letter-spacing="3">AUDIENCE</text>
  <text x="858" y="408" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#00c8ff">AU SMBs</text>

  <circle cx="840" cy="468" r="3" fill="#00c8ff"/>
  <rect x="840" y="468" width="240" height="1" fill="#1e2d3d"/>
  <text x="858" y="461" font-family="Courier New,monospace" font-size="9" fill="#4a6070" letter-spacing="3">LANGUAGE</text>
  <text x="858" y="491" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#00c8ff">PLAIN ENGLISH</text>

  <!-- Live pulse — inset from top-right corner -->
  <circle cx="1060" cy="80" r="5" fill="#00ff88" opacity="0.9"/>
  <text x="1073" y="85" font-family="Courier New,monospace" font-size="11" fill="#00ff88" letter-spacing="3">LIVE</text>

  <!-- URL footer — centred, y=600 keeps it within safe zone -->
  <text x="600" y="598" font-family="Courier New,monospace" font-size="13" fill="#243447" text-anchor="middle" letter-spacing="4">CISOAI.AU/NEWS</text>
</svg>
